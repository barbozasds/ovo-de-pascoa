<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<title>Para Izabelly 💖</title>

<style>
* { -webkit-tap-highlight-color: transparent; }

body {
  margin:0;
  overflow:hidden;
  height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: radial-gradient(circle at top,#4a2a2a,#2a1414);
  color:white;
}

/* INTRO */
.intro {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
  background:#1a0d0d;
  transition:1s;
}

.intro-texto {
  font-family:'Great Vibes',cursive;
  font-size:clamp(28px,7vw,42px);
  text-align:center;
  animation: brilho 2s infinite alternate;
}

@keyframes brilho {
  from { text-shadow:0 0 5px #fff; }
  to { text-shadow:0 0 20px #ffd166; }
}

.fade-out { opacity:0; pointer-events:none; }

/* FUNDO */
.fundo { position:fixed; width:100%; height:100%; z-index:-1; }

.particula-bg {
  position:absolute;
  width:4px;height:4px;
  background:rgba(255,220,180,.6);
  border-radius:50%;
  animation:subir linear infinite;
}

@keyframes subir {
  from { transform:translateY(100dvh); opacity:0;}
  20% {opacity:1;}
  to { transform:translateY(-10vh); opacity:0;}
}

/* CONTAINER */
.container {
  position:relative;
  width:90vw;
  max-width:350px;
  height:45vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* OVO */
.ovo {
  position:relative;
  width:45vw;
  max-width:170px;
  height:60vw;
  max-height:210px;
}

.parte {
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50% 50% 45% 45%;
  background: radial-gradient(circle at 30% 30%, #8b4513, #5a2e1f 60%, #2b140f);
  transition:1s;
}

.topo { z-index:2; }
.baixo { filter:brightness(.85); }

/* 🔥 RACHADURA CORRIGIDA DEFINITIVA */
.trinca {
  position:absolute;
  width:100%;
  height:100%;
}

.trinca::before {
  content:"";
  position:absolute;
  width:4px;
  height:100%;
  left:50%;
  transform:translateX(-50%) scaleY(0);
  transform-origin:center;
  background:#1a0d0a;
  opacity:0;
  transition: transform 0.4s ease, opacity 0.3s ease;
  backface-visibility:hidden;
}

.rachar .trinca::before {
  transform:translateX(-50%) scaleY(1);
  opacity:1;
}

/* 🚨 REMOVE TOTALMENTE AO ABRIR */
.abrir .trinca::before {
  display:none;
}

/* LAÇO */
.laco {
  position:absolute;
  width:110%;
  height:8%;
  background:#ff4d6d;
  top:45%;
  left:-5%;
  border-radius:10px;
  z-index:3;
  transition:1s;
}

.laco::before {
  content:"";
  position:absolute;
  width:20%;
  height:200%;
  background:#ff1f4d;
  border-radius:50%;
  top:-50%;
  left:40%;
}

/* ABRIR */
.abrir .topo { transform:translateX(-120%) rotate(-15deg); }
.abrir .baixo { transform:translateX(120%) rotate(15deg); }
.abrir .laco { transform:translateY(-40vh); opacity:0; }

/* MENSAGEM */
.mensagem {
  position:absolute;
  width:95%;
  text-align:center;
  font-family:'Great Vibes',cursive;
  font-size:clamp(22px,6vw,32px);
  z-index:5;
}

/* BOTÃO */
button {
  margin-top:30px;
  padding:12px 20px;
  border:none;
  background:#ff4d6d;
  color:white;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="intro" id="intro">
  <div class="intro-texto">
    <span id="introTexto"></span>
  </div>
</div>

<div class="fundo" id="fundo"></div>

<div class="container" id="container" style="opacity:0;">
  <div class="ovo">
    <div class="parte topo"></div>
    <div class="parte baixo"></div>
    <div class="trinca"></div>
    <div class="laco"></div>
  </div>

  <div class="mensagem">
    <span id="texto"></span>
  </div>
</div>

<button onclick="toggleOvo()" id="btn" style="opacity:0;">Para Izabelly</button>

<script>
const mensagem="Que o nosso amor seja doce, como chocolate, e sempre deixe um gostinho de quero mais. 🤎🐰";
const introMsg="Feliz Páscoa, minha Coelhinha";

let aberto=false;

/* INTRO */
function digitarIntro(){
  let i=0;
  const el=document.getElementById("introTexto");

  function loop(){
    if(i<introMsg.length){
      el.innerHTML+=introMsg[i++];
      setTimeout(loop,60);
    } else {
      setTimeout(iniciar,1500);
    }
  }
  loop();
}

function iniciar(){
  document.getElementById("intro").classList.add("fade-out");

  setTimeout(()=>{
    document.getElementById("container").style.opacity=1;
    document.getElementById("btn").style.opacity=1;
  },800);
}

/* FUNDO */
function fundo(){
  const f=document.getElementById("fundo");
  for(let i=0;i<40;i++){
    let p=document.createElement("div");
    p.className="particula-bg";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    f.appendChild(p);
  }
}

fundo();
digitarIntro();

/* OVO */
function toggleOvo(){
  const c=document.getElementById("container");
  const b=document.getElementById("btn");

  if(!aberto){
    c.classList.add("rachar");
    setTimeout(()=>c.classList.add("abrir"),400);
    setTimeout(()=>digitar(),600);
    b.innerText="Fechar";
    aberto=true;
  } else {
    c.classList.remove("abrir","rachar");
    document.getElementById("texto").innerHTML="";
    b.innerText="Para Izabelly";
    aberto=false;
  }
}

function digitar(){
  let i=0;
  const el=document.getElementById("texto");

  function loop(){
    if(i<mensagem.length){
      el.innerHTML+=mensagem[i++];
      setTimeout(loop,40);
    }
  }
  loop();
}
</script>

</body>
</html>
